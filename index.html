<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LilithPlay - Interactive Game Platform for Couples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A;
      color: #F5F5F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 500px; text-align: center; }
    h1 {
      font-size: 42px; font-weight: 900;
      background: linear-gradient(135deg, #E5163F, #FF4D6D);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px; margin-bottom: 12px;
    }
    .tagline {
      font-size: 15px; color: rgba(245,245,245,0.4);
      margin-bottom: 40px;
    }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .links a {
      display: block;
      padding: 14px 24px;
      background: #151518;
      border: 1px solid rgba(245,245,245,0.06);
      border-radius: 12px;
      color: rgba(245,245,245,0.6);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.2s;
    }
    .links a:hover {
      border-color: rgba(229,22,63,0.4);
      color: #F5F5F5;
    }
    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(245,245,245,0.15);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LilithPlay</h1>
    <p class="tagline">Interactive Game Platform for Couples</p>
    <div class="links">
      <a href="/privacy-policy">Privacy Policy</a>
      <a href="/terms">Terms of Use</a>
      <a href="/delete-account">Delete Account</a>
      <a href="mailto:odgameinfo@gmail.com">Contact: odgameinfo@gmail.com</a>
    </div>
    <div class="footer"><p>&copy; 2025 LilithPlay. All rights reserved.</p></div>
  </div>
</body>
</html>
